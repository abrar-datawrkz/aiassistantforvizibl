<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Vizibl Chat AI (Test)</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: #f5f5f5;
}

/* Floating Button */
#chat-toggle {
  position: fixed;
  bottom: 20px;
  right: 20px;
  background: #ff6a00;
  color: white;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 26px;
  cursor: pointer;
  box-shadow: 0 5px 25px rgba(255,106,0,0.5);
  transition: transform 0.2s ease;
}

#chat-toggle:hover {
  transform: scale(1.05);
}

/* Chat Container */
#chat-container {
  position: fixed;
  bottom: 90px;
  right: 20px;
  width: 380px;
  height: 550px;
  background: white;
  border-radius: 16px;
  display: none;
  flex-direction: column;
  box-shadow: 0 10px 40px rgba(0,0,0,0.2);
  overflow: hidden;
}

/* Header */
#chat-header {
  background: #111;
  color: white;
  padding: 18px;
  font-size: 16px;
  font-weight: bold;
  display: flex;
  justify-content: space-between;
  align-items: center;
  border-top: 4px solid #ff6a00;
}

#chat-header span {
  color: #ff6a00;
  cursor: pointer;
  font-size: 18px;
}

/* Messages */
#chat-messages {
  flex: 1;
  padding: 20px;
  overflow-y: auto;
  font-size: 14px;
  line-height: 1.6;
  background: #fafafa;
}

/* Message bubbles */
.message {
  margin-bottom: 15px;
  max-width: 80%;
  padding: 12px 14px;
  border-radius: 14px;
  animation: fadeIn 0.2s ease-in;
}

.user {
  background: #ff6a00;
  color: white;
  margin-left: auto;
}

.bot {
  background: white;
  color: #111;
  border: 1px solid #eee;
}

/* Input Area */
#chat-input-area {
  display: flex;
  border-top: 1px solid #eee;
  background: white;
}

#chat-input {
  flex: 1;
  border: none;
  padding: 15px;
  font-size: 14px;
  outline: none;
}

#chat-send {
  background: #111;
  color: white;
  border: none;
  padding: 0 20px;
  cursor: pointer;
  transition: background 0.2s ease;
}

#chat-send:hover {
  background: #ff6a00;
}

/* Animation */
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(4px); }
  to { opacity: 1; transform: translateY(0); }
}
</style>
</head>

<body>

<div id="chat-toggle">💬</div>

<div id="chat-container">
  <div id="chat-header">
    Vizibl Chat AI
    <span id="chat-close">✕</span>
  </div>
  <div id="chat-messages">
    <div class="message bot">
      Hi — I’m Vizibl Chat AI.  
      I can guide you through our DSP integrations, capabilities, and how we simplify programmatic advertising.  
      Ask me anything.
    </div>
  </div>
  <div id="chat-input-area">
    <input type="text" id="chat-input" placeholder="Ask about Vizibl, DSP access, pricing, capabilities..." />
    <button id="chat-send">Send</button>
  </div>
</div>

<script>
const toggle = document.getElementById("chat-toggle");
const container = document.getElementById("chat-container");
const closeBtn = document.getElementById("chat-close");
const sendBtn = document.getElementById("chat-send");
const input = document.getElementById("chat-input");
const messages = document.getElementById("chat-messages");

toggle.onclick = () => container.style.display = "flex";
closeBtn.onclick = () => container.style.display = "none";

sendBtn.onclick = sendMessage;
input.addEventListener("keypress", function(e) {
  if (e.key === "Enter") sendMessage();
});

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  const userMsg = document.createElement("div");
  userMsg.className = "message user";
  userMsg.textContent = text;
  messages.appendChild(userMsg);

  input.value = "";

  const botMsg = document.createElement("div");
  botMsg.className = "message bot";
  botMsg.textContent = "Thinking...";
  messages.appendChild(botMsg);

  messages.scrollTop = messages.scrollHeight;

  try {
    const response = await fetch("https://aiassistantforvizibl.onrender.com/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: text })
    });

    const data = await response.json();
    botMsg.textContent = data.reply;
  } catch (error) {
    botMsg.textContent = "Oops! Something went wrong. Please try again.";
    console.error("Error fetching response:", error);
  }

  messages.scrollTop = messages.scrollHeight;
}
</script>

</body>
</html>
